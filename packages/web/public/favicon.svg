<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AGENTLOOP">
  <rect width="64" height="64" rx="12" fill="#FAFAF7" />
  <!-- The loop: hairline ring with a break at the lower-right -->
  <circle
    cx="32"
    cy="32"
    r="20"
    stroke="#8C3A1E"
    stroke-width="4"
    stroke-linecap="round"
    pathLength="360"
    stroke-dasharray="344 360"
    stroke-dashoffset="-55"
  />
  <!-- The curated digest: many sources converge to one focal point -->
  <circle cx="32" cy="32" r="5.5" fill="#8C3A1E" />
</svg>
