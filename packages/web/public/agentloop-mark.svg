<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AGENTLOOP">
  <!-- The loop: hairline ring with a break at the lower-right (the day's loop closes when the issue ships) -->
  <circle
    cx="50"
    cy="50"
    r="45"
    stroke="#8C3A1E"
    stroke-width="5"
    stroke-linecap="round"
    pathLength="360"
    stroke-dasharray="328 32"
    stroke-dashoffset="-20"
  />
  <!-- The curated digest: many sources converge to one focal point -->
  <circle cx="50" cy="50" r="12" fill="#8C3A1E" />
</svg>
