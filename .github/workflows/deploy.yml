name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  build-images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, pipeline]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployment/dockerfiles/${{ matrix.service }}.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/ai-news-aggregator-${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/ai-news-aggregator-${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          # buildx defaults to attaching a provenance attestation, which is pushed
          # to GHCR as an extra manifest. That extra push intermittently fails with
          # "failed to fetch oauth token: denied: denied" (the image layers/manifest
          # push fine; only the attestation referrer is rejected). We don't consume
          # attestations, so disable them — this removes the denied push entirely.
          provenance: false
          sbom: false

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @newsletter/shared build

      - run: pnpm --filter @newsletter/web build

      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: packages/web/dist
          retention-days: 7
          if-no-files-found: error

  deploy:
    needs: [build-images, build-web]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout (deployment/ files only)
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            deployment
          sparse-checkout-cone-mode: false

      - name: Download web bundle
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web-dist

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Trust host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Generate production runtime env
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
          RANKING_MODEL: ${{ secrets.RANKING_MODEL }}
          WEB_CRAWLER_CONCURRENCY: ${{ secrets.WEB_CRAWLER_CONCURRENCY }}
          RETTIWT_API_KEY: ${{ secrets.RETTIWT_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          API_PORT: ${{ secrets.API_PORT }}
          PUBLIC_BASE_URL: ${{ secrets.PUBLIC_BASE_URL }}
          NEWSLETTER_BASE_URL: ${{ secrets.NEWSLETTER_BASE_URL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FROM_MAIL: ${{ secrets.FROM_MAIL }}
          NEWSLETTER_REPLY_TO_EMAIL: ${{ secrets.NEWSLETTER_REPLY_TO_EMAIL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
          LINKEDIN_API_VERSION: ${{ secrets.LINKEDIN_API_VERSION }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          AUTO_REVIEW: ${{ secrets.AUTO_REVIEW }}
          REDDIT_HTTP_PROXY: ${{ secrets.REDDIT_HTTP_PROXY }}
          GHCR_REPO_OWNER: ${{ secrets.GHCR_REPO_OWNER }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          python3 <<'PY'
          import os
          import re
          import sys
          from pathlib import Path

          required = [
              "DATABASE_URL",
              "POSTGRES_USER",
              "POSTGRES_PASSWORD",
              "POSTGRES_DB",
              "REDIS_URL",
              "ANTHROPIC_API_KEY",
              "DEEPSEEK_API_KEY",
              "JINA_API_KEY",
              "RANKING_MODEL",
              "RETTIWT_API_KEY",
              "TAVILY_API_KEY",
              "API_PORT",
              "PUBLIC_BASE_URL",
              "NEWSLETTER_BASE_URL",
              "ADMIN_PASSWORD",
              "SESSION_SECRET",
              "RESEND_API_KEY",
              "FROM_MAIL",
              "GHCR_REPO_OWNER",
              "GHCR_USERNAME",
              "GHCR_TOKEN",
          ]
          optional = [
              "WEB_CRAWLER_CONCURRENCY",
              "NEWSLETTER_REPLY_TO_EMAIL",
              "SLACK_WEBHOOK_URL",
              "LINKEDIN_CLIENT_ID",
              "LINKEDIN_CLIENT_SECRET",
              "LINKEDIN_API_VERSION",
              "TWITTER_API_KEY",
              "TWITTER_API_SECRET",
              "TWITTER_ACCESS_TOKEN",
              "TWITTER_ACCESS_TOKEN_SECRET",
              "AUTO_REVIEW",
              "REDDIT_HTTP_PROXY",
          ]
          names = required + optional
          template = Path("deployment/.env.prod.example").read_text()
          template_names = {
              match.group(1)
              for line in template.splitlines()
              if (match := re.match(r"^\s*#?\s*([A-Z0-9_]+)=", line))
          }
          missing_from_workflow = sorted(template_names - set(names))
          extra_in_workflow = sorted(set(names) - template_names)
          if missing_from_workflow or extra_in_workflow:
              print("runtime.env key list is out of sync with deployment/.env.prod.example", file=sys.stderr)
              if missing_from_workflow:
                  print(f"Missing from workflow: {', '.join(missing_from_workflow)}", file=sys.stderr)
              if extra_in_workflow:
                  print(f"Extra in workflow: {', '.join(extra_in_workflow)}", file=sys.stderr)
              sys.exit(1)

          missing = [name for name in required if os.environ.get(name, "") == ""]
          if missing:
              print(f"Missing required production secrets: {', '.join(missing)}", file=sys.stderr)
              sys.exit(1)

          lines = []
          for name in names:
              value = os.environ.get(name, "")
              if "\n" in value or "\r" in value:
                  print(f"Secret {name} contains a newline, which is not supported in dotenv runtime.env", file=sys.stderr)
                  sys.exit(1)
              if value:
                  masked_value = value.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")
                  print(f"::add-mask::{masked_value}")
              lines.append(f"{name}={value}")

          Path("runtime.env").write_text("\n".join(lines) + "\n")
          print(f"Generated runtime.env with {len(names)} keys")
          PY

      - name: Rsync deployment directory to server
        run: |
          rsync -az --delete \
            --delete-excluded \
            --exclude='.env.prod.example' \
            --exclude='.env.prod.enc' \
            --exclude='.sops.yaml' \
            deployment/ \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/newsletter/deployment/"

      - name: Install runtime env on server
        run: |
          scp runtime.env "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/newsletter-runtime.env"
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "sudo tee /etc/newsletter/.env < /tmp/newsletter-runtime.env > /dev/null && sudo chown root:${{ secrets.DEPLOY_USER }} /etc/newsletter/.env && sudo chmod 640 /etc/newsletter/.env && rm -f /tmp/newsletter-runtime.env"

      - name: Rsync web bundle to server
        run: |
          rsync -az --delete \
            web-dist/ \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/var/www/newsletter/web/"

      - name: Run deploy.sh on server
        run: |
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "bash /opt/newsletter/deployment/deploy.sh ${{ github.sha }}"
