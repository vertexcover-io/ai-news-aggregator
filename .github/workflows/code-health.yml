name: Code Health

on:
  workflow_dispatch:
    inputs:
      skill:
        description: 'Which code health skill to run'
        required: true
        type: choice
        options:
          - all
          - tech-debt
          - docs
          - coverage

concurrency:
  group: code-health-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  code-health:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run tech-debt finder
        id: tech-debt
        if: ${{ github.event.inputs.skill == 'all' || github.event.inputs.skill == 'tech-debt' }}
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/vertexcover-io/harness-engineering.git'
          plugins: 'harness@main'
          show_full_output: true
          additional_permissions: |
            actions: read
          claude_args: |
            --permission-mode bypassPermissions
          prompt: |
            You have access to the harness plugin with skills including `harness:tech-debt-finder` and `harness:orchestrate`.

            Step 1: Use the Skill tool to invoke `harness:tech-debt-finder` to scan the codebase for tech debt. This will generate a report of all issues found.

            Step 2: Once the report is generated, use the Skill tool to invoke `harness:orchestrate` with the report as input and the `--auto` flag. For example: `harness:orchestrate <path-to-report> --auto`
            The orchestrate skill will fix all issues from the report in auto mode (no interactive approval needed).

            Step 3: After orchestrate completes, if there are code changes, commit them and create a PR with title prefix `chore(tech-debt):`. If no changes were needed, skip PR creation.
          branch_prefix: 'code-health/'

      - name: Run docs sync
        id: docs-sync
        if: ${{ github.event.inputs.skill == 'all' || github.event.inputs.skill == 'docs' }}
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/vertexcover-io/harness-engineering.git'
          plugins: 'harness@main'
          show_full_output: true
          additional_permissions: |
            actions: read
          claude_args: |
            --permission-mode bypassPermissions
          prompt: |
            You have access to the harness plugin with skills including `harness:sync-docs` and `harness:orchestrate`.

            Step 1: Use the Skill tool to invoke `harness:sync-docs` to scan for stale, missing, or contradictory documentation. This will generate a report.

            Step 2: Once the report is generated, use the Skill tool to invoke `harness:orchestrate` with the report as input and the `--auto` flag. For example: `harness:orchestrate <path-to-report> --auto`
            The orchestrate skill will fix all documentation issues in auto mode.

            Step 3: After orchestrate completes, if there are changes, commit and create a PR with title prefix `docs:`. If no changes, skip PR creation.
          branch_prefix: 'code-health/'

      - name: Run coverage guard
        id: coverage
        if: ${{ github.event.inputs.skill == 'all' || github.event.inputs.skill == 'coverage' }}
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/vertexcover-io/harness-engineering.git'
          plugins: 'harness@main'
          show_full_output: true
          additional_permissions: |
            actions: read
          claude_args: |
            --permission-mode bypassPermissions
          prompt: |
            You have access to the harness plugin with skills including `harness:coverage-guard` and `harness:orchestrate`.

            Step 1: Use the Skill tool to invoke `harness:coverage-guard` to check test coverage and identify coverage gaps. This will generate a report.

            Step 2: Once the report is generated, use the Skill tool to invoke `harness:orchestrate` with the report as input and the `--auto` flag. For example: `harness:orchestrate <path-to-report> --auto`
            The orchestrate skill will add missing tests in auto mode.

            Step 3: After orchestrate completes, if there are changes, commit and create a PR with title prefix `test(coverage):`. If no changes, skip PR creation.
          branch_prefix: 'code-health/'

      - name: Collect PR links
        id: collect-prs
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_START: ${{ github.event.repository.updated_at }}
        run: |
          PRS=""
          # Find all open PRs created in this run by searching for recent PRs
          # Claude/orchestrate creates branches with patterns like chore/tech-debt-*, docs/*, test/coverage-*, code-health/*
          RECENT_PRS=$(gh pr list --state open --json url,title,createdAt --jq '.[].url' 2>/dev/null || echo "")
          # Also check PRs created in the last 30 minutes to catch ones from this run
          for PR_URL in $RECENT_PRS; do
            PR_CREATED=$(gh pr view "$PR_URL" --json createdAt --jq '.createdAt' 2>/dev/null || echo "")
            if [ -n "$PR_CREATED" ]; then
              # Check if PR was created within the last 30 minutes
              PR_TS=$(date -d "$PR_CREATED" +%s 2>/dev/null || echo "0")
              NOW_TS=$(date +%s)
              DIFF=$(( NOW_TS - PR_TS ))
              if [ "$DIFF" -lt 1800 ]; then
                PR_TITLE=$(gh pr view "$PR_URL" --json title --jq '.title' 2>/dev/null || echo "")
                PRS="${PRS}\n• *${PR_TITLE}:* ${PR_URL}"
              fi
            fi
          done
          if [ -z "$PRS" ]; then
            PRS="No PRs created — nothing to fix."
          fi
          echo "pr_summary<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$PRS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Notify Slack
        if: always() && vars.SLACK_NOTIFICATIONS_ENABLED == 'true'
        uses: slackapi/slack-github-action@v2.1.0
        env:
          SKILL_INPUT: ${{ github.event.inputs.skill }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PR_SUMMARY: ${{ steps.collect-prs.outputs.pr_summary }}
          REPO_NAME: ${{ github.repository }}
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":wrench: *Code Health Run Complete*\n\n*Repo:* ${{ env.REPO_NAME }}\n*Skill:* `${{ env.SKILL_INPUT }}`\n*Status:* ${{ env.JOB_STATUS }}\n*Run:* ${{ env.RUN_URL }}\n\n*PRs:*\n${{ env.PR_SUMMARY }}"
            }
