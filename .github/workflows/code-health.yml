name: Code Health

on:
  workflow_dispatch:
    inputs:
      skill:
        description: 'Which code health skill to run'
        required: true
        type: choice
        options:
          - all
          - tech-debt
          - docs
          - coverage
  schedule:
    - cron: "3 9 * * 1"

concurrency:
  group: code-health-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  code-health:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run tech-debt finder
        id: tech-debt
        if: ${{ (github.event.inputs.skill || 'all') == 'all' || github.event.inputs.skill == 'tech-debt' }}
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/vertexcover-io/harness-engineering.git'
          plugins: 'harness@main'
          show_full_output: true
          additional_permissions: |
            actions: read
          claude_args: |
            --permission-mode bypassPermissions
            --json-schema '{"type":"object","properties":{"pr_url":{"type":"string","description":"Full URL of the PR created, or empty string if none"},"pr_number":{"type":"integer","description":"PR number, or 0 if none"},"summary":{"type":"string","description":"2-4 sentence high-level summary of what was done. If no changes, explain why."},"changes_made":{"type":"boolean"},"files_changed":{"type":"integer"}},"required":["pr_url","summary","changes_made"]}'
          prompt: |
            You have access to the harness plugin with skills including `harness:tech-debt-finder` and `harness:orchestrate`.

            Step 1: Use the Skill tool to invoke `harness:tech-debt-finder` to scan the codebase for tech debt. This will generate a report of all issues found.

            Step 2: Once the report is generated, use the Skill tool to invoke `harness:orchestrate` with the report as input and the `--auto` flag. For example: `harness:orchestrate <path-to-report> --auto`
            The orchestrate skill will fix all issues from the report in auto mode (no interactive approval needed).

            Step 3: After orchestrate completes, if there are code changes, commit them and create a PR with title prefix `chore(tech-debt):`. If no changes were needed, skip PR creation.

            Step 4: Return a structured output matching the schema with:
              - pr_url: the full PR URL (or "" if none created)
              - pr_number: the PR number (or 0)
              - summary: a crisp 2-4 sentence description of the concrete issues fixed (or why nothing was changed). Avoid generic phrasing.
              - changes_made: true/false
              - files_changed: number of files modified
          branch_prefix: 'code-health/'

      - name: Run docs sync
        id: docs-sync
        if: ${{ (github.event.inputs.skill || 'all') == 'all' || github.event.inputs.skill == 'docs' }}
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/vertexcover-io/harness-engineering.git'
          plugins: 'harness@main'
          show_full_output: true
          additional_permissions: |
            actions: read
          claude_args: |
            --permission-mode bypassPermissions
            --json-schema '{"type":"object","properties":{"pr_url":{"type":"string"},"pr_number":{"type":"integer"},"summary":{"type":"string"},"changes_made":{"type":"boolean"},"files_changed":{"type":"integer"}},"required":["pr_url","summary","changes_made"]}'
          prompt: |
            You have access to the harness plugin with skills including `harness:sync-docs` and `harness:orchestrate`.

            Step 1: Use the Skill tool to invoke `harness:sync-docs` to scan for stale, missing, or contradictory documentation. This will generate a report.

            Step 2: Once the report is generated, use the Skill tool to invoke `harness:orchestrate` with the report as input and the `--auto` flag. For example: `harness:orchestrate <path-to-report> --auto`
            The orchestrate skill will fix all documentation issues in auto mode.

            Step 3: After orchestrate completes, if there are changes, commit and create a PR with title prefix `docs:`. If no changes, skip PR creation.

            Step 4: Return structured output with pr_url, pr_number, summary (2-4 sentences naming the docs updated and why), changes_made, and files_changed.
          branch_prefix: 'code-health/'

      - name: Run coverage guard
        id: coverage
        if: ${{ (github.event.inputs.skill || 'all') == 'all' || github.event.inputs.skill == 'coverage' }}
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/vertexcover-io/harness-engineering.git'
          plugins: 'harness@main'
          show_full_output: true
          additional_permissions: |
            actions: read
          claude_args: |
            --permission-mode bypassPermissions
            --json-schema '{"type":"object","properties":{"pr_url":{"type":"string"},"pr_number":{"type":"integer"},"summary":{"type":"string"},"changes_made":{"type":"boolean"},"files_changed":{"type":"integer"}},"required":["pr_url","summary","changes_made"]}'
          prompt: |
            You have access to the harness plugin with skills including `harness:coverage-guard` and `harness:orchestrate`.

            Step 1: Use the Skill tool to invoke `harness:coverage-guard` to check test coverage and identify coverage gaps. This will generate a report.

            Step 2: Once the report is generated, use the Skill tool to invoke `harness:orchestrate` with the report as input and the `--auto` flag. For example: `harness:orchestrate <path-to-report> --auto`
            The orchestrate skill will add missing tests in auto mode.

            Step 3: After orchestrate completes, if there are changes, commit and create a PR with title prefix `test(coverage):`. If no changes, skip PR creation.

            Step 4: Return structured output with pr_url, pr_number, summary (2-4 sentences listing which modules got new tests and the coverage delta), changes_made, and files_changed.
          branch_prefix: 'code-health/'

      - name: Resolve PRs and build Slack payload
        id: build-payload
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SKILL_INPUT: ${{ github.event.inputs.skill || 'all (scheduled)' }}
          JOB_STATUS: ${{ job.status }}
          TECH_DEBT_OUTCOME: ${{ steps.tech-debt.outcome }}
          TECH_DEBT_BRANCH: ${{ steps.tech-debt.outputs.branch_name }}
          TECH_DEBT_STRUCT: ${{ steps.tech-debt.outputs.structured_output }}
          DOCS_OUTCOME: ${{ steps.docs-sync.outcome }}
          DOCS_BRANCH: ${{ steps.docs-sync.outputs.branch_name }}
          DOCS_STRUCT: ${{ steps.docs-sync.outputs.structured_output }}
          COVERAGE_OUTCOME: ${{ steps.coverage.outcome }}
          COVERAGE_BRANCH: ${{ steps.coverage.outputs.branch_name }}
          COVERAGE_STRUCT: ${{ steps.coverage.outputs.structured_output }}
        run: |
          set -euo pipefail

          # Resolve PR URL and summary for a single skill.
          # Priority: structured_output.pr_url -> `gh pr list --head <branch>` -> empty.
          # Summary falls back to first 400 chars of PR body if structured_output missing.
          resolve_block() {
            local label="$1" outcome="$2" branch="$3" struct="$4"

            if [ "$outcome" = "skipped" ] || [ -z "$outcome" ]; then
              return 0
            fi

            local url="" summary=""
            if [ -n "$struct" ]; then
              url=$(printf '%s' "$struct" | jq -r '.pr_url // ""' 2>/dev/null || true)
              summary=$(printf '%s' "$struct" | jq -r '.summary // ""' 2>/dev/null || true)
            fi

            if [ -z "$url" ] && [ -n "$branch" ]; then
              url=$(gh pr list --head "$branch" --state all --json url --jq '.[0].url // ""' 2>/dev/null || true)
            fi

            if [ -z "$summary" ] && [ -n "$url" ]; then
              summary=$(gh pr view "$url" --json body --jq '.body' 2>/dev/null | head -c 400 || true)
            fi

            [ -z "$summary" ] && summary="_No summary returned by agent._"

            local icon=":white_check_mark:"
            [ "$outcome" != "success" ] && icon=":x:"

            local pr_line="_No PR created_"
            [ -n "$url" ] && pr_line="<${url}|View PR>"

            # Prefix summary lines with `> ` for Slack blockquote
            local quoted
            quoted=$(printf '%s\n' "$summary" | sed 's/^/> /')

            printf '\n*%s %s* (%s)\n%s\n%s\n' "$icon" "$label" "$outcome" "$pr_line" "$quoted"
          }

          {
            printf 'text<<SLACK_EOF\n'
            printf ':wrench: *Code Health Run Complete* — <%s|Run log>\n' "$RUN_URL"
            printf '*Repo:* `%s` · *Skill:* `%s` · *Job:* %s\n' "$REPO" "$SKILL_INPUT" "$JOB_STATUS"
            resolve_block "Tech Debt"      "$TECH_DEBT_OUTCOME" "$TECH_DEBT_BRANCH" "$TECH_DEBT_STRUCT"
            resolve_block "Docs Sync"      "$DOCS_OUTCOME"      "$DOCS_BRANCH"      "$DOCS_STRUCT"
            resolve_block "Coverage Guard" "$COVERAGE_OUTCOME"  "$COVERAGE_BRANCH"  "$COVERAGE_STRUCT"
            printf 'SLACK_EOF\n'
          } >> "$GITHUB_OUTPUT"

      - name: Notify Slack
        if: always() && vars.SLACK_NOTIFICATIONS_ENABLED == 'true'
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ${{ toJSON(steps.build-payload.outputs.text) }}
            }
