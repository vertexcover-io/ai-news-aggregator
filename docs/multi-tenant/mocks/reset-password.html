<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Set a new password — AGENTLOOP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Geist+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css">
<style>
  .center { min-height: 100vh; display: grid; place-items: center; padding: 32px 20px; }
  .auth-card { width: min(400px, 100%); }
  .auth-card .top { text-align: center; margin-bottom: 24px; }
  .req { font-family: var(--font-mono); font-size: 11px; letter-spacing:.04em; color: var(--mute); display:flex; align-items:center; gap:7px; margin-top:8px; }
  .req.met { color: var(--ok); }
</style>
</head>
<body>
<div class="center">
  <div class="auth-card">
    <div class="top">
      <svg class="brandmark" width="30" height="30" viewBox="0 0 100 100" fill="none" aria-label="logo" style="margin-bottom:14px">
        <circle cx="50" cy="50" r="45" stroke="currentColor" stroke-width="5" stroke-linecap="round" pathLength="360" stroke-dasharray="344 360" stroke-dashoffset="-55"/>
        <circle cx="50" cy="50" r="12" fill="currentColor"/>
      </svg>
      <p class="kicker kicker-rust">Choose a new password</p>
      <h2 class="display">Set your password</h2>
    </div>

    <div class="card">
      <form onsubmit="return false">
        <div class="field">
          <label class="label" for="pw">New password</label>
          <input class="input" id="pw" type="password" placeholder="••••••••" autocomplete="new-password">
          <div class="req met">✓ At least 10 characters</div>
        </div>
        <div class="field" style="margin-bottom:14px">
          <label class="label" for="pw2">Confirm new password</label>
          <input class="input" id="pw2" type="password" placeholder="••••••••" autocomplete="new-password">
        </div>
        <button class="btn btn-primary btn-block" style="padding:11px">Update password & sign in</button>
      </form>
    </div>
    <p class="help" style="text-align:center; margin-top:16px">This reset link is single-use and expires 30 minutes after it was sent.</p>
  </div>
</div>
</body>
</html>
