<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reset password — AGENTLOOP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Geist+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css">
<style>
  .center { min-height: 100vh; display: grid; place-items: center; padding: 32px 20px; }
  .auth-card { width: min(400px, 100%); }
  .auth-card .top { text-align: center; margin-bottom: 24px; }
  .back { display:inline-flex; align-items:center; gap:6px; font-family: var(--font-mono); font-size: 11px; letter-spacing:.14em; text-transform:uppercase; color: var(--mute); text-decoration:none; margin-top:18px; }
  .back:hover { color: var(--ink); }
  .sent { display:flex; gap:10px; align-items:flex-start; }
</style>
</head>
<body>
<div class="center">
  <div class="auth-card">
    <div class="top">
      <svg class="brandmark" width="30" height="30" viewBox="0 0 100 100" fill="none" aria-label="logo" style="margin-bottom:14px">
        <circle cx="50" cy="50" r="45" stroke="currentColor" stroke-width="5" stroke-linecap="round" pathLength="360" stroke-dasharray="344 360" stroke-dashoffset="-55"/>
        <circle cx="50" cy="50" r="12" fill="currentColor"/>
      </svg>
      <p class="kicker kicker-rust">Password reset</p>
      <h2 class="display">Forgot your password?</h2>
    </div>

    <div class="card">
      <p class="help" style="margin:0 0 16px; font-size:13.5px">Enter the email on your account and we’ll send a reset link from <span class="code">no-reply@ourdomain.com</span>.</p>
      <form onsubmit="return false">
        <div class="field" style="margin-bottom:14px">
          <label class="label" for="email">Email</label>
          <input class="input" id="email" type="email" placeholder="ada@studio.com" autocomplete="email">
        </div>
        <button class="btn btn-primary btn-block" style="padding:11px">Send reset link</button>
      </form>

      <hr class="divider">
      <div class="sent">
        <span class="dot dot-ok" style="margin-top:6px"></span>
        <p class="help" style="margin:0">If an account exists for that email, a reset link is on its way. The link expires in 30 minutes and can be used once.</p>
      </div>
    </div>

    <div style="text-align:center"><a class="back" href="#">← Back to log in</a></div>
  </div>
</div>
</body>
</html>
